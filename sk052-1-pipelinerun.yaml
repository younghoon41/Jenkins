apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: sk052-1-complex-pipeline-run
  namespace: class-2
spec:
  pipelineRef:
    name: yh-clone-and-build
  taskRunSpecs:
    - pipelineTaskName: fetch-source
      podTemplate:
        securityContext:
          fsGroup: 65532
  params:
    - name: repo-url
      value: "https://github.com/tektoncd/pipeline.git"
    - name: revision
      value: "main"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: sk052-1-pvc

